<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <title>AutoApplier - Reset Password</title>
  <style>
    :root{
      --bg:#ffffff; --bg-soft:#f5f8ff; --border:rgba(15,23,42,.10); --border-hi:rgba(37,99,235,.40);
      --accent:#2563eb; --accent-2:#3b82f6; --accent-dk:#1d4ed8; --accent-light:#1d4ed8;
      --text:#0f172a; --muted:#56617a; --dim:#8a93a6; --green:#16a34a; --red:#dc2626;
    }
    *{margin:0;padding:0;box-sizing:border-box}
    body{
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif;
      background:radial-gradient(70% 60% at 50% 0%,rgba(59,130,246,.10),transparent 60%),var(--bg);
      color:var(--text); min-height:100vh; display:flex; flex-direction:column; align-items:center; justify-content:center;
      padding:24px; -webkit-font-smoothing:antialiased;
    }
    .brand{display:flex;align-items:center;gap:9px;font-size:18px;font-weight:800;letter-spacing:-.01em;color:var(--text);text-decoration:none;margin-bottom:22px}
    .brand .brand-logo{height:34px;width:auto;display:block}
    .card{
      width:100%; max-width:400px; background:#fff; border:1px solid var(--border); border-radius:18px; padding:32px 30px; text-align:center;
      box-shadow:0 24px 60px -24px rgba(15,23,42,.22), 0 2px 8px rgba(15,23,42,.05);
    }
    .card .ico{font-size:32px;margin-bottom:6px}
    h2{font-size:21px;font-weight:800;letter-spacing:-.01em;margin:6px 0 4px}
    p{font-size:13.5px;color:var(--muted);margin-bottom:18px}
    .pw{position:relative}
    input{width:100%;margin:7px 0;background:#fff;border:1px solid var(--border);color:var(--text);border-radius:10px;padding:12px 44px 12px 13px;font-size:14px;transition:border-color .15s,box-shadow .15s}
    input:focus{outline:none;border-color:var(--accent);box-shadow:0 0 0 3px rgba(37,99,235,.14)}
    input::placeholder{color:var(--dim)}
    .eye{position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:16px}
    .btn{width:100%;background:linear-gradient(135deg,var(--accent-2),var(--accent-dk));color:#fff;border:none;border-radius:11px;padding:13px;font-size:15px;font-weight:800;cursor:pointer;margin-top:8px;box-shadow:0 8px 18px rgba(37,99,235,.3);transition:filter .12s,transform .12s}
    .btn:hover{filter:brightness(1.07);transform:translateY(-1px)}
    .btn:disabled{opacity:.5;cursor:not-allowed;transform:none;filter:none}
    .msg{font-size:13px;margin-top:12px;min-height:16px}.msg.err{color:var(--red)}.msg.ok{color:var(--green)}
    a{color:var(--accent-light);text-decoration:none;font-size:13px;font-weight:600}
    a:hover{text-decoration:underline}
  </style>
</head>
<body>
  <a class="brand" href="/"><img src="/assets/logo.svg" alt="Job Auto Applier" class="brand-logo"/></a>
  <div class="card">
    <div class="ico">🔑</div>
    <h2>Set a new password</h2>
    <p>Enter a new password for your AutoApplier account.</p>
    <div class="pw">
      <input id="pass" type="password" placeholder="New password (min 6 chars)" autocomplete="new-password" />
      <button class="eye" id="eye" type="button" title="Show/hide">👁</button>
    </div>
    <button class="btn" id="go">Update password</button>
    <div id="msg" class="msg"></div>
    <div style="margin-top:16px"><a href="/checkout.html">← Back to sign in</a></div>
  </div>
  <script>
    const $ = s => document.querySelector(s);
    const token = new URLSearchParams(location.search).get('token');
    if (!token) { $('#msg').className='msg err'; $('#msg').textContent='Invalid reset link, no token.'; $('#go').disabled = true; }

    $('#eye').onclick = () => { const p=$('#pass'); p.type = p.type==='password'?'text':'password'; };
    $('#pass').addEventListener('keydown', e => { if (e.key==='Enter') submit(); });
    $('#go').onclick = submit;

    async function submit() {
      const password = $('#pass').value;
      if (password.length < 6) { $('#msg').className='msg err'; $('#msg').textContent='Password must be at least 6 characters'; return; }
      $('#msg').className='msg'; $('#msg').textContent='Updating…';
      try {
        const r = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'reset', token, password }) });
        const d = await r.json(); if (!r.ok) throw new Error(d.error || r.status);
        $('#msg').className='msg ok'; $('#msg').textContent='Password updated! Redirecting to sign in…';
        setTimeout(()=>location.href='/checkout.html', 1400);
      } catch (e) { $('#msg').className='msg err'; $('#msg').textContent = e.message; }
    }
  </script>
</body>
</html>
