<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" role="img" aria-label="AutoApplier">
  <defs>
    <!-- Metallic ring band -->
    <linearGradient id="ring" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0"  stop-color="#a9cbff"/>
      <stop offset=".35" stop-color="#3b82f6"/>
      <stop offset=".7" stop-color="#1d4ed8"/>
      <stop offset="1"  stop-color="#0e2a6e"/>
    </linearGradient>
    <!-- Night sky inside the ring -->
    <radialGradient id="sky" cx="34%" cy="28%" r="85%">
      <stop offset="0" stop-color="#243357"/>
      <stop offset="1" stop-color="#0a1022"/>
    </radialGradient>
    <!-- Moon surface -->
    <radialGradient id="moon" cx="36%" cy="32%" r="80%">
      <stop offset="0"  stop-color="#fffdf4"/>
      <stop offset=".65" stop-color="#f2ecd4"/>
      <stop offset="1"  stop-color="#d7cca4"/>
    </radialGradient>
    <radialGradient id="glow" cx="50%" cy="50%" r="50%">
      <stop offset="0" stop-color="#fdf6d8" stop-opacity=".55"/>
      <stop offset="1" stop-color="#fdf6d8" stop-opacity="0"/>
    </radialGradient>
    <!-- Crescent: full moon minus an offset disc -->
    <mask id="crescent">
      <rect width="32" height="32" fill="#000"/>
      <circle cx="16.4" cy="16.2" r="7.1" fill="#fff"/>
      <circle cx="19.8" cy="14.1" r="6.1" fill="#000"/>
    </mask>
  </defs>

  <!-- Ring band -->
  <circle cx="16" cy="16" r="15.2" fill="url(#ring)"/>
  <!-- Band depth: bright top-left rim, dark bottom-right rim -->
  <circle cx="16" cy="16" r="14.4" fill="none" stroke="#ffffff" stroke-opacity=".28" stroke-width=".7"/>
  <!-- Night sky disc -->
  <circle cx="16" cy="16" r="12.6" fill="url(#sky)"/>
  <circle cx="16" cy="16" r="12.6" fill="none" stroke="#000000" stroke-opacity=".35" stroke-width=".8"/>

  <!-- Stars -->
  <circle cx="9.2"  cy="10"   r=".75" fill="#fff"     opacity=".9"/>
  <circle cx="11.4" cy="22"   r=".5"  fill="#dfe9ff"  opacity=".75"/>
  <circle cx="22.4" cy="21.6" r=".6"  fill="#cfe0ff"  opacity=".8"/>
  <path d="M20 8.6 l.35 .95 .95 .35 -.95 .35 -.35 .95 -.35 -.95 -.95 -.35 .95 -.35 z" fill="#fff" opacity=".85"/>

  <!-- Soft moon glow -->
  <circle cx="15.4" cy="16" r="9" fill="url(#glow)"/>

  <!-- Crescent moon + craters -->
  <g mask="url(#crescent)">
    <circle cx="16.4" cy="16.2" r="7.1" fill="url(#moon)"/>
    <circle cx="13.1" cy="14"   r="1.15" fill="#cbbd91" opacity=".55"/>
    <circle cx="12.3" cy="18.5" r=".85"  fill="#cbbd91" opacity=".5"/>
    <circle cx="14.9" cy="19.8" r=".6"   fill="#cbbd91" opacity=".45"/>
    <circle cx="11.9" cy="15.6" r=".5"   fill="#cbbd91" opacity=".4"/>
  </g>
</svg>
