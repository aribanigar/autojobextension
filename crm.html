<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
  <link rel="apple-touch-icon" href="/favicon.svg" />
  <title>AutoApplier CRM – Application Tracker</title>
  <style>
    :root {
      --violet:#8b5cf6; --violet2:#7c3aed; --violet-dk:#6d28d9;
      --bg:#0b0817; --card:#161029; --card2:#1d1636;
      --text:#f1eefb; --muted:#9d95c0; --dim:#6f6790;
      --border:rgba(139,92,246,.16); --border2:rgba(139,92,246,.32);
      --green:#34d399; --red:#f87171; --amber:#fbbf24; --blue:#60a5fa;
    }
    * { margin:0; padding:0; box-sizing:border-box; }
    body {
      font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,Roboto,sans-serif;
      background:radial-gradient(130% 55% at 50% -8%,rgba(124,58,237,.20),transparent 65%),var(--bg);
      color:var(--text); min-height:100vh; font-size:14px; line-height:1.5;
    }
    ::-webkit-scrollbar{width:10px;height:10px}
    ::-webkit-scrollbar-thumb{background:var(--border2);border-radius:8px}
    .container { max-width:1080px; margin:0 auto; padding:26px 24px 60px; }
    header { display:flex; align-items:center; justify-content:space-between; gap:16px; padding:6px 0 22px; flex-wrap:wrap; }
    h1 { font-size:22px; font-weight:800; letter-spacing:-.01em; }
    h1 a { color:var(--muted); text-decoration:none; font-weight:500; }
    h1 a:hover { color:var(--text); }
    .live { display:inline-flex; align-items:center; gap:7px; font-size:12.5px; font-weight:600; color:var(--green); background:rgba(52,211,153,.1); border:1px solid rgba(52,211,153,.28); padding:5px 12px; border-radius:999px; }
    .live .dot { width:7px; height:7px; border-radius:50%; background:var(--green); animation:bl 1.2s infinite; }
    .live.err { color:var(--red); background:rgba(248,113,113,.1); border-color:rgba(248,113,113,.28); }
    .live.err .dot { background:var(--red); animation:none; }
    @keyframes bl { 0%,100%{opacity:1} 50%{opacity:.25} }

    .cards { display:grid; grid-template-columns:repeat(auto-fit,minmax(150px,1fr)); gap:12px; margin-bottom:22px; }
    .card { background:var(--card); border:1px solid var(--border); border-radius:14px; padding:16px 18px; transition:border-color .15s,transform .15s; }
    .card:hover { border-color:var(--border2); transform:translateY(-2px); }
    .card .n { font-size:28px; font-weight:800; letter-spacing:-.02em; background:linear-gradient(120deg,var(--text),var(--violet)); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
    .card .l { font-size:11.5px; color:var(--muted); margin-top:2px; text-transform:uppercase; letter-spacing:.04em; font-weight:600; }

    .bar { display:flex; gap:10px; margin-bottom:16px; flex-wrap:wrap; }
    input, select, button, textarea {
      background:var(--card); border:1px solid var(--border); color:var(--text);
      border-radius:10px; padding:9px 13px; font-size:13.5px; font-family:inherit; transition:border-color .15s,box-shadow .15s;
    }
    input:focus, select:focus { outline:none; border-color:var(--violet); box-shadow:0 0 0 3px rgba(124,58,237,.16); }
    button { cursor:pointer; font-weight:600; transition:filter .12s,background .15s,border-color .15s; }
    button:hover { filter:brightness(1.08); }
    .btn-v { background:linear-gradient(135deg,var(--violet),var(--violet-dk)); border:none; color:#fff; font-weight:700; box-shadow:0 6px 16px rgba(124,58,237,.32); }

    table { width:100%; border-collapse:collapse; background:var(--card); border:1px solid var(--border); border-radius:14px; overflow:hidden; }
    th, td { padding:12px 14px; text-align:left; font-size:13px; border-bottom:1px solid var(--border); vertical-align:middle; }
    th { color:var(--dim); font-weight:700; font-size:11px; text-transform:uppercase; letter-spacing:.05em; background:var(--card2); }
    tbody tr { transition:background .12s; }
    tbody tr:hover { background:rgba(139,92,246,.05); }
    tr:last-child td { border-bottom:none; }
    td a { color:#a78bfa; text-decoration:none; font-weight:600; } td a:hover { text-decoration:underline; }
    .plat { padding:3px 10px; border-radius:999px; font-size:10.5px; font-weight:800; text-transform:capitalize; }
    .plat.linkedin { background:rgba(96,165,250,.15); color:var(--blue); }
    .plat.indeed   { background:rgba(129,140,248,.15); color:#818cf8; }
    .plat.naukri   { background:rgba(52,211,153,.15); color:var(--green); }
    select.st { padding:5px 9px; font-size:12px; border-radius:8px; font-weight:700; }
    select.st.applied   { color:var(--blue); }   select.st.interview { color:var(--amber); }
    select.st.offer     { color:var(--green); }  select.st.rejected  { color:var(--red); }
    select.st.skipped   { color:var(--muted); }
    .fit { font-weight:800; } .fit.hi { color:var(--green); } .fit.mid { color:var(--amber); } .fit.lo { color:var(--red); }
    td input.notes { width:100%; min-width:140px; font-size:12.5px; padding:6px 9px; background:transparent; border-color:transparent; border-radius:7px; }
    td input.notes:hover, td input.notes:focus { border-color:var(--border2); background:var(--bg); box-shadow:none; }
    .del { background:transparent; border:none; color:var(--dim); font-size:15px; padding:2px 7px; border-radius:6px; }
    .del:hover { color:var(--red); background:rgba(248,113,113,.1); filter:none; }

    .empty, .gate { text-align:center; padding:56px 24px; color:var(--muted); background:var(--card); border-radius:16px; border:1px solid var(--border); }
    .gate { max-width:380px; margin:48px auto; }
    .gate h2 { color:var(--text); }
    .gate input { margin:8px 0; width:280px; }
    .gate .btn-v, .gate button { margin:4px 3px; }
    .err-msg { color:var(--red); font-size:13px; margin-top:10px; min-height:16px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📋 AutoApplier CRM <a href="/" style="font-size:13px;color:var(--muted)">← landing</a></h1>
      <span id="live" class="live" style="display:none"><span class="dot"></span><span id="live-txt">live</span></span>
    </header>

    <!-- License key + email/password gate -->
    <div id="gate" class="gate">
      <div style="font-size:34px">🔑</div>
      <h2 style="margin:10px 0 4px">Enter your license key</h2>
      <p>Paste the key you were given — it opens your CRM.</p>
      <div style="display:flex;flex-direction:column;gap:10px;align-items:center;margin-top:14px">
        <input id="key-input" type="text" placeholder="AA-XXXX-XXXX-XXXX" autocomplete="off" style="width:280px;text-transform:uppercase;font-weight:600;letter-spacing:.04em" />
        <button class="btn-v" id="key-btn">Open CRM</button>
        <div id="key-err" class="err-msg"></div>
      </div>
      <div style="margin:18px 0 8px;color:var(--muted);font-size:12px">— or log in with an email account —</div>
      <div style="display:flex;flex-direction:column;gap:10px;align-items:center">
        <input id="email-input" type="email" placeholder="Email" autocomplete="email" style="width:280px" />
        <div style="position:relative;width:280px">
          <input id="pass-input" type="password" placeholder="Password" autocomplete="current-password" style="width:280px;padding-right:40px;margin:0" />
          <button type="button" id="pass-eye" title="Show/hide" style="position:absolute;right:10px;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--muted);cursor:pointer;font-size:15px">👁</button>
        </div>
        <div>
          <button class="btn-v" id="login-btn">Log in</button>
          <button id="signup-btn">Create account</button>
        </div>
        <a href="#" id="forgot-btn" style="color:#a78bfa;font-size:12px;text-decoration:none">Forgot password?</a>
      </div>
      <div id="gate-err" class="err-msg"></div>
    </div>

    <div id="app" style="display:none">
      <div class="cards">
        <div class="card"><div class="n" id="c-total">–</div><div class="l">Total tracked</div></div>
        <div class="card"><div class="n" id="c-applied">–</div><div class="l">Applied</div></div>
        <div class="card"><div class="n" id="c-interview">–</div><div class="l">Interviews</div></div>
        <div class="card"><div class="n" id="c-offer">–</div><div class="l">Offers</div></div>
        <div class="card"><div class="n" id="c-week">–</div><div class="l">Last 7 days</div></div>
      </div>

      <div class="bar">
        <input id="f-q" type="search" placeholder="Search title…" style="flex:1;min-width:180px" />
        <select id="f-status">
          <option value="">All statuses</option>
          <option>applied</option><option>skipped</option><option>interview</option>
          <option>offer</option><option>rejected</option>
        </select>
        <select id="f-platform">
          <option value="">All platforms</option>
          <option>linkedin</option><option>indeed</option><option>naukri</option>
        </select>
        <button id="btn-refresh">↻ Refresh</button>
        <button id="btn-logout" title="Forget API key">Log out</button>
      </div>

      <div id="list"></div>
    </div>
  </div>

  <script>
    const $ = s => document.querySelector(s);
    const TOKEN_STORE = 'jobbot_crm_token';
    const EMAIL_STORE = 'jobbot_crm_email';
    const KEY_STORE   = 'jobbot_crm_key';
    let token = localStorage.getItem(TOKEN_STORE) || '';
    let licenseKey = localStorage.getItem(KEY_STORE) || '';
    let rows = [];
    let timer = null;

    // Auth header: license key takes precedence, else the account bearer token.
    const authHeaders = () => licenseKey ? { 'x-license-key': licenseKey } : { Authorization: 'Bearer ' + token };
    const api = (path, init = {}) =>
      fetch(path, { ...init, headers: { 'Content-Type': 'application/json', ...authHeaders(), ...init.headers } })
        .then(async r => { const d = await r.json().catch(() => ({})); if (!r.ok) throw new Error(d.error || r.status); return d; });

    function esc(s) { const d = document.createElement('div'); d.textContent = String(s ?? ''); return d.innerHTML; }

    function setLive(ok, msg) {
      const el = $('#live'); el.style.display = 'inline-flex';
      el.classList.toggle('err', !ok);
      $('#live-txt').textContent = msg;
    }

    function fitCls(v) { return v == null ? '' : v >= 70 ? 'hi' : v >= 40 ? 'mid' : 'lo'; }

    function render() {
      const total = rows.length;
      const by = s => rows.filter(r => r.status === s).length;
      const week = rows.filter(r => Date.now() - new Date(r.applied_at).getTime() < 7 * 864e5).length;
      $('#c-total').textContent = total; $('#c-applied').textContent = by('applied');
      $('#c-interview').textContent = by('interview'); $('#c-offer').textContent = by('offer');
      $('#c-week').textContent = week;

      if (!rows.length) {
        $('#list').innerHTML = '<div class="empty">📭 No applications tracked yet.<br><small>Run the AutoApplier agent with CRM sync configured in the extension popup — every application lands here in real time.</small></div>';
        return;
      }
      $('#list').innerHTML = `<table><thead><tr>
        <th>Job</th><th>Platform</th><th>Status</th><th>Fit</th><th>Notes</th><th>When</th><th></th>
      </tr></thead><tbody>${rows.map(r => `
        <tr data-id="${r.id}">
          <td>${r.url ? `<a href="${esc(r.url)}" target="_blank" rel="noopener">${esc(r.title || 'Untitled')}</a>` : esc(r.title || 'Untitled')}
              ${r.company ? `<div style="color:var(--muted);font-size:12px">${esc(r.company)}</div>` : ''}</td>
          <td><span class="plat ${esc(r.platform)}">${esc(r.platform)}</span></td>
          <td><select class="st ${esc(r.status)}" data-act="status">
            ${['applied','skipped','interview','offer','rejected'].map(s =>
              `<option ${s === r.status ? 'selected' : ''}>${s}</option>`).join('')}
          </select></td>
          <td class="fit ${fitCls(r.fit_score)}">${r.fit_score ?? '–'}</td>
          <td><input class="notes" data-act="notes" value="${esc(r.notes || '')}" placeholder="add note…" /></td>
          <td style="white-space:nowrap;color:var(--muted)">${new Date(r.applied_at).toLocaleString()}</td>
          <td><button class="del" data-act="del" title="Delete">✕</button></td>
        </tr>`).join('')}</tbody></table>`;
    }

    async function load(showErr = true) {
      const p = new URLSearchParams();
      if ($('#f-q').value) p.set('q', $('#f-q').value);
      if ($('#f-status').value) p.set('status', $('#f-status').value);
      if ($('#f-platform').value) p.set('platform', $('#f-platform').value);
      try {
        rows = await api('/api/jobs?' + p);
        const who = localStorage.getItem(EMAIL_STORE);
        setLive(true, (who ? who + ' · ' : '') + 'live · ' + new Date().toLocaleTimeString());
        render();
      } catch (e) {
        setLive(false, 'error: ' + e.message);
        if (/purchase required/i.test(String(e.message))) { location.href = '/checkout.html'; return; }
        if (showErr && /log in|session expired/i.test(String(e.message))) logout(e.message);
      }
    }

    async function start() {
      // Access check. License key → /api/license-key; account → /api/license.
      try {
        if (licenseKey) {
          const r = await fetch('/api/license-key', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key: licenseKey }) });
          const d = await r.json().catch(() => ({}));
          if (!r.ok || !d.valid || !d.active) return logout(d.error || 'License key invalid or expired');
        } else {
          const r = await fetch('/api/license', { headers: { Authorization: 'Bearer ' + token } });
          if (r.status === 401) return logout('Session expired — log in again');
          const lic = await r.json();
          if (!lic.active) { location.href = '/checkout.html'; return; }
        }
      } catch { /* if the check fails, /api/jobs still gates below */ }

      $('#gate').style.display = 'none'; $('#app').style.display = '';
      load();
      clearInterval(timer);
      timer = setInterval(() => load(false), 10000); // real-time: poll every 10s
    }

    function logout(msg) {
      localStorage.removeItem(TOKEN_STORE);
      localStorage.removeItem(EMAIL_STORE);
      localStorage.removeItem(KEY_STORE);
      token = ''; licenseKey = '';
      clearInterval(timer);
      $('#app').style.display = 'none'; $('#gate').style.display = '';
      $('#gate-err').textContent = msg || '';
    }

    // License-key login
    $('#key-btn').onclick = async () => {
      const key = $('#key-input').value.trim().toUpperCase();
      if (!key) { $('#key-err').textContent = 'Enter your license key'; return; }
      $('#key-err').textContent = 'Checking…';
      try {
        const r = await fetch('/api/license-key', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ key }) });
        const d = await r.json().catch(() => ({}));
        if (!r.ok || !d.valid) throw new Error(d.error || 'Invalid license key');
        if (!d.active) throw new Error(d.error || 'This key has expired');
        licenseKey = key; token = '';
        localStorage.setItem(KEY_STORE, key);
        localStorage.removeItem(TOKEN_STORE);
        $('#key-err').textContent = '';
        start();
      } catch (e) { $('#key-err').textContent = e.message; }
    };
    $('#key-input').addEventListener('keydown', e => { if (e.key === 'Enter') $('#key-btn').click(); });

    async function authenticate(action) {
      const email = $('#email-input').value.trim();
      const password = $('#pass-input').value;
      if (!email || !password) { $('#gate-err').textContent = 'Enter email and password'; return; }
      try {
        const r = await fetch('/api/auth', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ action, email, password }),
        });
        const d = await r.json().catch(() => ({}));
        if (!r.ok) throw new Error(d.error || r.status);
        token = d.token;
        localStorage.setItem(TOKEN_STORE, token);
        localStorage.setItem(EMAIL_STORE, d.email);
        licenseKey = ''; localStorage.removeItem(KEY_STORE); // account mode
        $('#gate-err').textContent = '';
        start();
      } catch (e) { $('#gate-err').textContent = e.message; }
    }
    $('#login-btn').onclick = () => authenticate('login');
    $('#signup-btn').onclick = () => authenticate('signup');
    $('#pass-input').addEventListener('keydown', e => { if (e.key === 'Enter') authenticate('login'); });
    $('#pass-eye').onclick = () => { const p = $('#pass-input'); p.type = p.type === 'password' ? 'text' : 'password'; };
    $('#forgot-btn').onclick = async (e) => {
      e.preventDefault();
      const email = $('#email-input').value.trim();
      if (!email) { $('#gate-err').textContent = 'Enter your email above, then click Forgot password.'; return; }
      $('#gate-err').textContent = 'Sending reset link…';
      try {
        const r = await fetch('/api/auth', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ action:'forgot', email }) });
        const d = await r.json();
        $('#gate-err').style.color = 'var(--green)';
        $('#gate-err').textContent = d.emailed === false ? (d.note || 'Contact an admin to reset your password.') : 'If that email is registered, a reset link is on its way.';
      } catch (err) { $('#gate-err').textContent = err.message; }
    };

    $('#btn-refresh').onclick = () => load();
    $('#btn-logout').onclick = () => logout();
    ['#f-q', '#f-status', '#f-platform'].forEach(s => $(s).addEventListener('input', () => load()));

    $('#list').addEventListener('change', async e => {
      const tr = e.target.closest('tr'); if (!tr) return;
      const id = tr.dataset.id, act = e.target.dataset.act;
      try {
        if (act === 'status') await api('/api/jobs', { method: 'PATCH', body: JSON.stringify({ id, status: e.target.value }) });
        if (act === 'notes')  await api('/api/jobs', { method: 'PATCH', body: JSON.stringify({ id, notes: e.target.value }) });
        load(false);
      } catch (err) { setLive(false, 'save failed: ' + err.message); }
    });
    $('#list').addEventListener('click', async e => {
      if (e.target.dataset.act !== 'del') return;
      const tr = e.target.closest('tr');
      if (!confirm('Delete this entry?')) return;
      try { await api('/api/jobs?id=' + tr.dataset.id, { method: 'DELETE' }); load(false); }
      catch (err) { setLive(false, 'delete failed: ' + err.message); }
    });

    if (licenseKey || token) start();
  </script>
</body>
</html>
